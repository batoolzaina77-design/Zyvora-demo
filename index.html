<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zynarox</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
        }

        header {
            display: flex;
            justify-content: space-between;
            padding: 20px;
            background: #020617;
        }

        header h1 {
            color: #38bdf8;
        }

        .hero {
            text-align: center;
            padding: 100px 20px;
        }

        .hero h2 {
            font-size: 40px;
        }

        .hero p {
            color: #94a3b8;
        }

        .btn {
            padding: 10px 20px;
            background: #38bdf8;
            color: black;
            border: none;
            cursor: pointer;
            margin-top: 20px;
        }

        .services {
            display: flex;
            justify-content: space-around;
            padding: 50px;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 10px;
            width: 200px;
        }

        footer {
            text-align: center;
            padding: 20px;
            background: #020617;
        }
    </style>
</head>

<body>

<header>
    <h1>Zynarox</h1>
    <p>Digital Agency</p>
</header>

<section class="hero">
    <h2>We Build Modern Websites</h2>
    <p>Helping businesses grow online with powerful websites</p>
    <button class="btn">Get Started</button>
</section>

<section class="services">
    <div class="card">
        <h3>Web Design</h3>
        <p>Modern and clean UI</p>
    </div>

    <div class="card">
        <h3>Development</h3>
        <p>Fast and responsive websites</p>
    </div>

    <div class="card">
        <h3>SEO</h3>
        <p>Rank higher on Google</p>
    </div>
</section>

<footer>
    <p>© 2026 Zynarox. All rights reserved.</p>
</footer>

</body>
</html>
